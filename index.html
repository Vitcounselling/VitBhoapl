<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Counselling Portal Clone</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1e5fa9; /* Royal blue background */
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Header Section */
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .vit-logo {
            max-width: 250px;
            height: auto;
            background-color: white;
            padding: 8px 16px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Main Content Layout */
        .container {
            display: flex;
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            align-items: flex-start;
            justify-content: center;
        }

        /* Common Card Styles */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            padding: 30px;
        }

        /* Left Side: Login Form */
        .login-card {
            flex: 1;
            max-width: 380px;
        }

        .login-card h2 {
            text-align: center;
            color: #444;
            font-size: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus {
            border-color: #1e5fa9;
        }

        /* Captcha Styling */
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .captcha-box {
            background: #e1e1e1;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 22px;
            font-style: italic;
            letter-spacing: 4px;
            padding: 8px 15px;
            border-radius: 4px;
            user-select: none;
            color: #2b5797;
            border: 1px dashed #999;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(-45deg, #ccc 25%, transparent 25%);
            background-size: 10px 10px;
        }

        .refresh-btn {
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:hover {
            background: #f5f5f5;
        }

        .login-btn {
            width: 100%;
            background-color: #0f4580;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
        }

        .login-btn:hover {
            background-color: #0a3360;
        }

        .forgot-password {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #1e5fa9;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Right Side: Instructions Panel */
        .instructions-card {
            flex: 2;
            max-width: 680px;
        }

        .instructions-card h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .instructions-card ol {
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .instructions-card li {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
            color: #444;
        }

        /* Support Section */
        .support-section h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 12px;
        }

        .support-list {
            list-style: none;
        }

        .support-list li {
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .support-list a {
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }

        .support-list span {
            color: blue;
            font-weight: bold;
        }

        /* --- DASHBOARD STYLES (Hidden by default) --- */
        #dashboardPage {
            display: none;
            width: 100%;
            max-width: 1200px;
            background: #f4f7f6;
            border-radius: 12px;
            padding: 20px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: #333;
        }

        .top-navbar {
            background-color: #0f4580;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .top-navbar h2 {
            font-size: 18px;
        }

        .logout-link {
            background: #d9534f;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .info-strip {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #ddd;
        }

        .info-item strong {
            color: #1e5fa9;
        }

        .main-workspace {
            display: flex;
            gap: 20px;
        }

        .choice-panel {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .choice-panel h3, .table-panel h3 {
            margin-bottom: 15px;
            color: #0f4580;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .form-select-group {
            margin-bottom: 15px;
        }

        .form-select-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-select-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .add-preference-btn {
            width: 100%;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .table-panel {
            flex: 2;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .preference-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .preference-table th, .preference-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            font-size: 13px;
        }

        .preference-table th {
            background-color: #f2f5f8;
        }

        .delete-row-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
        }

        .save-lock-btn {
            background-color: #0f4580;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            float: right;
        }

        @media (max-width: 850px) {
            .container, .main-workspace {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- --- PAGE 1: LOGIN PORTAL LAYOUT --- -->
    <div id="loginPage" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <header>
            <img src="download.png" alt="VIT Logo" class="vit-logo">
            <h1>Online Counselling for B.Tech. Admissions (2026 - 27)</h1>
        </header>

        <div class="container">
            <!-- Left Card: Form -->
            <div class="card login-card">
                <h2>Candidate Login</h2>
                <form id="loginForm">
