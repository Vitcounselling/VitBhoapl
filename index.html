<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Counselling Portal Clone</title>
    <style>
        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1e5fa9; /* Royal blue background */
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Header Section */
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .vit-logo {
            max-width: 250px;
            height: auto;
            background-color: white;
            padding: 8px 16px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 10px;
        }

        header h1 {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Main Content Layout */
        .container {
            display: flex;
            gap: 30px;
            max-width: 1100px;
            width: 100%;
            align-items: flex-start;
            justify-content: center;
        }

        /* Common Card Styles */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            padding: 30px;
        }

        /* Left Side: Login Form */
        .login-card {
            flex: 1;
            max-width: 380px;
        }

        .login-card h2 {
            text-align: center;
            color: #444;
            font-size: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus {
            border-color: #1e5fa9;
        }

        /* Captcha Styling */
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .captcha-box {
            background: #e1e1e1;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 22px;
            font-style: italic;
            letter-spacing: 4px;
            padding: 8px 15px;
            border-radius: 4px;
            user-select: none;
            color: #2b5797;
            border: 1px dashed #999;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(-45deg, #ccc 25%, transparent 25%);
            background-size: 10px 10px;
        }

        .refresh-btn {
            background: none;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .refresh-btn:hover {
            background: #f5f5f5;
        }

        .login-btn {
            width: 100%;
            background-color: #0f4580;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
        }

        .login-btn:hover {
            background-color: #0a3360;
        }

        .forgot-password {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #1e5fa9;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Right Side: Instructions Panel */
        .instructions-card {
            flex: 2;
            max-width: 680px;
        }

        .instructions-card h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .instructions-card ol {
            padding-left: 20px;
            margin-bottom: 30px;
        }

        .instructions-card li {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
            color: #444;
        }

        /* --- PAGE A: LETTER VIEW PANEL (Hidden by default) --- */
        #documentViewPage {
            display: none;
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .doc-header {
            background-color: #0f4580;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .doc-header h2 {
            font-size: 16px;
        }

        .back-btn {
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        .letter-image {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* --- PAGE B: ONLINE FEE PORTAL PANEL (Hidden by default) --- */
        #feePortalPage {
            display: none;
            width: 100%;
            max-width: 650px;
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-top: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .fee-header {
            background-color: #28a745; /* Green color for billing header */
            color: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 25px;
        }

        .fee-details-box {
            border: 1px dashed #28a745;
            background-color: #f9fff9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .fee-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        .fee-row:last-child {
            border-bottom: none;
            font-weight: bold;
            font-size: 18px;
            color: #28a745;
        }

        .pay-submit-btn {
            background-color: #28a745;
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
        }

        .pay-submit-btn:hover {
            background-color: #218838;
        }

        @media (max-width: 850px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- --- MODULE 1: LANDING PAGE AND FORM CARD --- -->
    <div id="loginPage" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <header>
            <img src="download.png" alt="VIT Logo" class="vit-logo">
            <h1>Online Counselling for B.Tech. Admissions (2026 - 27)</h1>
        </header>

        <div class="container">
            <div class="card login-card">
                <h2>Candidate Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <input type="text" id="appNum" placeholder="Application Number" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="passWord" placeholder="Password" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="emailId" placeholder="Registered Email" required>
                    </div>
                    
                    <div class="captcha-container">
                        <div class="captcha-box">iMR8</div>
                        <button type="button" class="refresh-btn" title="Refresh Captcha">🔄</button>
                    </div>
                    
                    <div class="form-group">
                        <input type="text" placeholder="Enter Captcha" required>
                    </div>

                    <!-- Visual alert error layout message hook -->
                    <div id="errorMessage" style="color: #d9534f; font-size: 14px; margin-bottom: 12px; text-align: center; font-weight: bold;"></div>

                    <button type="submit" class="login-btn">Login</button>
                    <a href="#" class="forgot-password">Forgot password ?</a>
                </form>
            </div>

            <div class="card instructions-card">
                <h2>Instructions & Guidelines</h2>
